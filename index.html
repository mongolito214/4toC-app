<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>4to C</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore, collection, addDoc, onSnapshot, query, orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDEtYaLmss9BLeOlObTCM-xWZ4KKv908jE",
      authDomain: "toc-f6683.firebaseapp.com",
      projectId: "toc-f6683",
      storageBucket: "toc-f6683.firebasestorage.app",
      messagingSenderId: "377447851795",
      appId: "1:377447851795:web:9f2613605d9c50ebdfdce6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const form = document.getElementById("form");
    const lista = document.getElementById("lista");

    // 🔥 AGREGAR TAREA
    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const nombre = document.getElementById("nombre").value;
      const tarea = document.getElementById("tarea").value;

      await addDoc(collection(db, "pendingTasks"), {
        nombre,
        tarea,
        fecha: new Date().toLocaleDateString()
      });

      form.reset();
    });

    // 🔥 ESCUCHAR EN TIEMPO REAL
    const q = query(collection(db, "pendingTasks"), orderBy("fecha"));

    onSnapshot(q, (snapshot) => {
      lista.innerHTML = "";
      snapshot.forEach(doc => {
        const data = doc.data();

        lista.innerHTML += `
          <div class="card">
            <strong>${data.nombre}</strong>
            <p>${data.tarea}</p>
            <span>${data.fecha}</span>
          </div>
        `;
      });
    });
  </script>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 15px;
      text-align: center;
      font-weight: bold;
      font-size: 20px;
      background: #1e293b;
    }

    .container {
      padding: 15px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    input {
      background: #1e293b;
      color: white;
    }

    button {
      background: #38bdf8;
      font-weight: bold;
      cursor: pointer;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>4to C</header>

<div class="container">

  <form id="form">
    <input id="nombre" placeholder="Tu nombre" required>
    <input id="tarea" placeholder="Tarea" required>
    <button>Agregar tarea</button>
  </form>

  <h3>Tareas</h3>
  <div id="lista"></div>

</div>

</body>
</html>
